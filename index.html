<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Page</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        header h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        nav {
            display: flex;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #ffd700;
        }

        .container {
            text-align: center;
            padding: 50px 20px;
        }

        .card {
            background: white;
            color: black;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #ff9800;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e68900;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>🚀 Welcome to My DevOps Journey</h1>
    <p>Learning Git | Linux | Kubernetes</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <div class="card">
        <h2>About Me</h2>
        <p>I am learning DevOps step by step and building real projects.</p>
        <button onclick="showMessage()">Click Me</button>
    </div>
</div>

<footer>
    <p>© 2026 Yogesh | DevOps Learner</p>
</footer>

<script>
    function showMessage() {
        alert("Keep learning DevOps 🚀");
    }
</script>
<h1>I have done changes</h1>
</body>
</html>
